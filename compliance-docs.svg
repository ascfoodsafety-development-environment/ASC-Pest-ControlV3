<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-label="Audit-ready compliance documentation">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161d27"/><stop offset="1" stop-color="#0b0f15"/>
    </linearGradient>
    <radialGradient id="b" cx="80%" cy="12%" r="65%">
      <stop offset="0" stop-color="#F4541E" stop-opacity=".4"/>
      <stop offset="62%" stop-color="#F4541E" stop-opacity="0"/>
    </radialGradient>
    <pattern id="d" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#fff" opacity=".05"/>
    </pattern>
  </defs>
  <rect width="720" height="560" fill="url(#g)"/>
  <rect width="720" height="560" fill="url(#d)"/>
  <rect width="720" height="560" fill="url(#b)"/>

  <!-- back document -->
  <g transform="rotate(-7 250 300)">
    <rect x="150" y="170" width="300" height="360" rx="18" fill="#1a2230" stroke="#2f3a48" stroke-width="2"/>
  </g>
