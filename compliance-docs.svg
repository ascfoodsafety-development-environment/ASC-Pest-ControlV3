    <rect x="34" y="68" width="220" height="10" rx="5" fill="#33405200" stroke="#36425600"/>
    <!-- checklist rows -->
    <g stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="48" cy="120" r="13" fill="#F4541E"/><path d="M42 120l4 4 8-8" stroke="#fff" stroke-width="2.4"/>
      <rect x="74" y="113" width="190" height="13" rx="6.5" fill="#3a4656"/>
      <circle cx="48" cy="166" r="13" fill="#F4541E"/><path d="M42 166l4 4 8-8" stroke="#fff" stroke-width="2.4"/>
      <rect x="74" y="159" width="210" height="13" rx="6.5" fill="#3a4656"/>
      <circle cx="48" cy="212" r="13" fill="#F4541E"/><path d="M42 212l4 4 8-8" stroke="#fff" stroke-width="2.4"/>
      <rect x="74" y="205" width="160" height="13" rx="6.5" fill="#3a4656"/>
      <circle cx="48" cy="258" r="13" fill="none" stroke="#46546a" stroke-width="2.4"/>
      <rect x="74" y="251" width="200" height="13" rx="6.5" fill="#2c3744"/>
      <circle cx="48" cy="304" r="13" fill="none" stroke="#46546a" stroke-width="2.4"/>
      <rect x="74" y="297" width="140" height="13" rx="6.5" fill="#2c3744"/>
    </g>
    <!-- signature line -->
    <rect x="34" y="338" width="120" height="10" rx="5" fill="#46546a"/>
  </g>
  <!-- verified shield badge -->
  <g transform="translate(486 96)">
    <circle cx="0" cy="0" r="58" fill="#11161d" stroke="#F4541E" stroke-width="2"/>
    <g fill="none" stroke="#F4541E" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 -30 -22 -20v16c0 14 10 23 22 28 12-5 22-14 22-28v-16z"/>
      <path d="M-9 0l6 6 12-12"/>
